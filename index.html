<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marguel Sistema de Gestão Interna</title>

    <!-- UX-2: Aplicar tema escuro antes do React carregar — evita flash branco -->
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('mg_theme');
                if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.style.backgroundColor = '#0f172a';
                }
            } catch(e) {}
        })();
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#003366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Marguel SGI">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg-background)',
                        primary: 'var(--primary)',
                        card: 'var(--bg-card)',
                        border: 'var(--border-color)',
                        text: {
                            primary: 'var(--text-primary)',
                            secondary: 'var(--text-secondary)'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        
        .dark body {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .soft-ui {
            background: #ffffff;
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
            border-radius: 28px;
        }
        
        .dark .soft-ui {
            background: #1e293b;
            box-shadow: none;
            border: 1px solid #334155;
        }

        .soft-ui-inset {
            background: #f1f5f9;
            box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
        }

        .dark .soft-ui-inset {
            background: #0f172a;
            box-shadow: inset 2px 2px 5px #020617, inset -2px -2px 5px #1e293b;
        }

        .pill-button {
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        .pill-button:active {
            transform: scale(0.98);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="overflow-x-hidden transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
